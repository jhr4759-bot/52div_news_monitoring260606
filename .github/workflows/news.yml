name: news-monitor

on:
  schedule:
    # 한국시간(KST=UTC+9) 06:00 / 10:00 / 14:00 / 17:00
    # -> UTC 21:00(전일) / 01:00 / 05:00 / 08:00
    - cron: "0 21,1,5,8 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: news-monitor
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run monitor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python src/main.py

      - name: Commit sent_news.json
        run: |
          if [ -n "$(git status --porcelain sent_news.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add sent_news.json
            git commit -m "chore: update sent_news.json [skip ci]"
            git push
          else
            echo "sent_news.json 변경 없음 - 커밋 생략"
          fi
